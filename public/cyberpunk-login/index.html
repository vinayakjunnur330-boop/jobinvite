<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.1" />
  <title>Login — Access Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background layers -->
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <canvas id="particles"></canvas>
  <div class="bg-glow top" aria-hidden="true"></div>
  <div class="bg-glow bottom" aria-hidden="true"></div>

  <!-- Mouse spotlight (desktop only) -->
  <div class="mouse-spotlight" aria-hidden="true"></div>

  <!-- Login card -->
  <main class="login-container" id="loginCard">
    <div class="glow-border" aria-hidden="true"></div>
    <div class="card-inner">
      <header class="card-header">
        <div class="logo-ring" aria-hidden="true">
          <div class="logo-core"></div>
        </div>
        <h1 class="title">Welcome Back</h1>
        <p class="subtitle">Enter your credentials to access the system</p>
      </header>

      <form id="loginForm" class="form" novalidate>
        <div class="field">
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 1 4-4H4a4 4 0 0 1 4-4"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input
              id="username"
              type="text"
              placeholder="Username"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 1 0 1 10 0v4"></path>
            </svg>
            <input
              id="password"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
              <svg class="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.87 9.87 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="row">
          <label class="remember">
            <input type="checkbox" id="rememberMe" />
            <span class="check" aria-hidden="true"></span>
            <span class="remember-label">Remember me</span>
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden" aria-hidden="true">
            <span class="spinner"></span>
          </span>
          <span class="btn-success hidden" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </span>
        </button>
      </form>

      <p class="signup-hint">
        Don't have an account? <a href="#">Create one</a>
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
